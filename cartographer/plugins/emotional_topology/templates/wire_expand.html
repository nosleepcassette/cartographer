<!-- wire_expand.html — Hook: wire_expand (hover/click provenance detail) -->
<!-- This is the expanded detail panel shown on hover/click of a wire label -->
<!-- Content is generated by JS (see ui_extensions.py HOVER_EXPAND_JS) -->
<!-- This template defines the HTML structure the JS clones/fills -->

<template id="et-wire-expand-template">
  <div class="et-wire-expand" role="dialog" aria-label="Wire details">
    <div class="et-field">
      <span class="et-field-key">Source → Target</span>
      <span class="et-field-val" data-field="source-target"></span>
    </div>
    <div class="et-field">
      <span class="et-field-key">Predicate</span>
      <span class="et-field-val" data-field="predicate"></span>
    </div>
    <div class="et-field" data-optional="state">
      <span class="et-field-key">State</span>
      <span class="et-field-val" data-field="state"></span>
    </div>
    <div class="et-field" data-optional="note">
      <span class="et-field-key">Note</span>
      <span class="et-field-val" data-field="note"></span>
    </div>
    <div class="et-field" data-optional="author">
      <span class="et-field-key">Author</span>
      <span class="et-field-val" data-field="author"></span>
    </div>
    <div class="et-field" data-optional="method">
      <span class="et-field-key">Method</span>
      <span class="et-field-val" data-field="method"></span>
    </div>
    <div class="et-field" data-optional="confidence">
      <span class="et-field-key">Confidence</span>
      <span class="et-field-val" data-field="confidence"></span>
    </div>
    <div class="et-field" data-optional="reviewed">
      <span class="et-field-key">Reviewed</span>
      <span class="et-field-val" data-field="reviewed"></span>
    </div>
    <div class="et-field" data-optional="review-duration">
      <span class="et-field-key">Review duration</span>
      <span class="et-field-val" data-field="review-duration"></span>
    </div>
    <div class="et-field" data-optional="privacy">
      <span class="et-field-key">Privacy</span>
      <span class="et-field-val" data-field="privacy"></span>
    </div>

    <!-- Privacy dropdown (shown only for inner-circle viewers) -->
    <div class="et-privacy-row" data-optional="privacy-control">
      <span class="et-field-key">Set privacy</span>
      <select class="et-privacy-select" data-field="privacy-select">
        <option value="public">Public</option>
        <option value="inner-circle">Inner Circle</option>
        <option value="private">Private</option>
      </select>
    </div>

    <!-- Action buttons -->
    <div class="et-actions">
      <button data-action="edit">Edit</button>
      <button data-action="review">Review</button>
      <button data-action="delete">Delete</button>
    </div>
  </div>
</template>
